const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const fmt = (n, d=2) => n.toFixed(d);
const fmtMoney = n => "$" + Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoneySign = n => (n >= 0 ? "+" : "-") + fmtMoney(n);
const pctClass = v => v > 0 ? "positive" : v < 0 ? "negative" : "neutral";

function getTodayDayName() {
  const d = new Date();
  const day = d.getDay();
  if (day === 0 || day === 6) return "Mon"; // Weekend -> show Monday
  return DAYS[day - 1];
}

function getNextWeekdayDate(dayName) {
  const dayIdx = DAYS.indexOf(dayName) + 1;
  const now = new Date();
  let d = new Date(now);
  while (d.getDay() !== dayIdx) d.setDate(d.getDate() + 1);
  return d.toISOString().split("T")[0];
}

function getBuyDate(dayName) {
  const dayIdx = DAYS.indexOf(dayName) + 1;
  const now = new Date();
  let d = new Date(now);
  while (d.getDay() !== dayIdx) d.setDate(d.getDate() + 1);
  d.setDate(d.getDate() - 1);
  if (d.getDay() === 0) d.setDate(d.getDate() - 2);
  if (d.getDay() === 6) d.setDate(d.getDate() - 1);
  return d;
}

function getMomentumColor(m) {
  if (m >= 70) return "var(--green)";
  if (m >= 50) return "var(--yellow)";
  if (m >= 30) return "var(--orange)";
  return "var(--red)";
}

function momentumBar(m) {
  return `<span class="momentum-bar"><span class="momentum-fill" style="width:${m}%;background:${getMomentumColor(m)}"></span></span>${m}`;
}

function riskMeter(r) {
  let html = '<span class="risk-meter">';
  for (let i = 1; i <= 5; i++) {
    let cls = i <= r ? (r <= 2 ? "active-low" : r <= 3 ? "active-med" : r <= 4 ? "active-high" : "active-extreme") : "";
    html += `<span class="risk-block ${cls}"></span>`;
  }
  html += '</span>';
  return html;
}

function compositeScore(etf) {
  const momScore = etf.mom / 100;
  const yieldScore = Math.min(etf.wy / 1.5, 1);
  const erosionPenalty = Math.max(0, 1 + etf.navE / 50);
  const trScore = Math.max(0, etf.tr / 25);
  const riskAdj = (6 - etf.risk) / 5;
  return ((momScore * 0.30 + yieldScore * 0.25 + erosionPenalty * 0.20 + trScore * 0.15 + riskAdj * 0.10) * 100).toFixed(1);
}

function captureEfficiency(etf) {
  if (etf.navE === 0) return 100;
  const grossYieldAnnual = etf.ay;
  const netReturn = etf.tr;
  return Math.max(0, Math.min(100, (netReturn / grossYieldAnnual * 100))).toFixed(0);
}

function positionSize(etf) {
  const maxDollars = STATE.capital * (STATE.maxPositionPct / 100);
  const riskMult = {1: 1.2, 2: 1.0, 3: 0.8, 4: 0.6, 5: 0.4};
  const profileMult = {conservative: 0.6, moderate: 1.0, aggressive: 1.4};
  const mult = (riskMult[etf.risk] || 1) * (profileMult[STATE.riskProfile] || 1);
  const adjusted = Math.min(maxDollars * mult, maxDollars);
  const shares = Math.floor(adjusted / etf.p);
  return { dollars: shares * etf.p, shares, expectedDiv: shares * etf.div };
}

function getAllSectors() { return [...new Set(ETF_DB.map(e => e.sec))].sort(); }
function getAllTypes() { return [...new Set(ETF_DB.map(e => e.type))].sort(); }

// ═══════════════════════════════════════════════════════
// MONTHLY ETF EX-DIV HELPERS
// ═══════════════════════════════════════════════════════
function getNextExDivDate(etf) {
  if (!etf.exDayOfMonth) return null;
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  let d = new Date(y, m, etf.exDayOfMonth);
  // If this month's date already passed, use next month
  if (d < new Date(y, m, now.getDate())) d = new Date(y, m + 1, etf.exDayOfMonth);
  // If weekend, shift to prior Friday
  if (d.getDay() === 0) d.setDate(d.getDate() - 2);
  if (d.getDay() === 6) d.setDate(d.getDate() - 1);
  return d;
}

function getMonthlyBuySignals() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tStr = tomorrow.toDateString();
  return ETF_DB.filter(e => e.freq === "M" && e.exDayOfMonth).filter(e => {
    const exDate = getNextExDivDate(e);
    return exDate && exDate.toDateString() === tStr;
  }).sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)));
}

function getMonthlyBuySignalsForDate(targetDate) {
  const tStr = targetDate.toDateString();
  return ETF_DB.filter(e => e.freq === "M" && e.exDayOfMonth).filter(e => {
    const exDate = getNextExDivDate(e);
    return exDate && exDate.toDateString() === tStr;
  }).sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)));
}

function showBuyModal(ticker) {
  const etf = ETF_DB.find(e => e.t === ticker);
  if (!etf) return;
  const ps = positionSize(etf);
  const existing = document.getElementById("buyModal");
  if (existing) existing.remove();

  const overlay = document.createElement("div");
  overlay.id = "buyModal";
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <h3>Buy ${etf.t} — ${etf.n}</h3>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">${etf.u} | ${etf.sec} | ${etf.freq === "W" ? "Weekly" : "Monthly"} | Risk: ${etf.risk}/5</div>
      <div class="form-row">
        <label>Price Per Share</label>
        <input type="number" id="modalPrice" step="0.01" value="${fmt(etf.p)}">
      </div>
      <div class="form-row">
        <label>Number of Shares</label>
        <input type="number" id="modalShares" step="1" min="1" value="${ps.shares}">
      </div>
      <div class="live-calc">
        <div style="color:var(--text-muted);font-size:10px;text-transform:uppercase;margin-bottom:6px">Order Summary</div>
        <div class="flex flex-between"><span>Total Cost:</span> <span id="modalCost" class="fw-bold">$${fmt(ps.dollars)}</span></div>
        <div class="flex flex-between"><span>Expected Div:</span> <span id="modalDiv" class="positive">$${fmt(ps.expectedDiv)}</span></div>
        <div class="flex flex-between"><span>% of Capital:</span> <span id="modalPct">${fmt(ps.dollars / STATE.capital * 100)}%</span></div>
        <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);color:var(--text-muted);font-size:10px">
          Suggested: ${ps.shares} shares @ $${fmt(etf.p)} (${fmt(STATE.maxPositionPct)}% position limit = $${fmt(STATE.capital * STATE.maxPositionPct / 100)})
        </div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="closeBuyModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmBuyModal('${etf.t}')">Confirm Buy</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeBuyModal(); });

  // Live updates
  const priceInput = document.getElementById("modalPrice");
  const sharesInput = document.getElementById("modalShares");
  const updateCalc = () => {
    const price = parseFloat(priceInput.value) || 0;
    const shares = parseInt(sharesInput.value) || 0;
    const cost = price * shares;
    const div = shares * etf.div;
    document.getElementById("modalCost").textContent = "$" + fmt(cost);
    document.getElementById("modalDiv").textContent = "$" + fmt(div);
    document.getElementById("modalPct").textContent = fmt(cost / STATE.capital * 100) + "%";
  };
  priceInput.addEventListener("input", updateCalc);
  sharesInput.addEventListener("input", updateCalc);
}

function closeBuyModal() {

function confirmManualEntry() {
  const ticker = document.getElementById("manualTicker").value;
  const price = parseFloat(document.getElementById("manualPrice").value);
  const shares = parseInt(document.getElementById("manualShares").value);
  const date = document.getElementById("manualDate").value;
  if (!price || price <= 0 || !shares || shares < 1) { alert("Enter valid price and shares."); return; }

  const existing = STATE.portfolio.find(p => p.ticker === ticker);
  if (existing) {
    const totalShares = existing.shares + shares;
    existing.avgCost = ((existing.avgCost * existing.shares) + (price * shares)) / totalShares;
    existing.shares = totalShares;
  } else {
    STATE.portfolio.push({ ticker, shares, avgCost: price, divsCollected: 0, entryDate: date });
  }
  STATE.tradeLog.push({ type: "BUY", ticker, shares, price, date, time: "manual" });
  saveState();
  closeBuyModal();
  render();
}

function getFilteredETFs() {
  let etfs = [...ETF_DB];
  if (STATE.filterFreq !== "All") etfs = etfs.filter(e => e.freq === STATE.filterFreq);
  if (STATE.filterDay !== "All") etfs = etfs.filter(e => e.exDay === STATE.filterDay);
  if (STATE.filterType !== "All") etfs = etfs.filter(e => e.type === STATE.filterType);
  if (STATE.filterSector !== "All") etfs = etfs.filter(e => e.sec === STATE.filterSector);
  if (STATE.searchTerm) {
    const s = STATE.searchTerm.toLowerCase();
    etfs = etfs.filter(e => e.t.toLowerCase().includes(s) || e.n.toLowerCase().includes(s) || e.u.toLowerCase().includes(s));
  }
  const col = STATE.sortCol;
  const dir = STATE.sortDir;
  etfs.sort((a, b) => {
    let av = col === "score" ? parseFloat(compositeScore(a)) : a[col];
    let bv = col === "score" ? parseFloat(compositeScore(b)) : b[col];
    if (typeof av === "string") return av.localeCompare(bv) * dir;
    return (av - bv) * dir;
  });
  return etfs;
}

// ═══════════════════════════════════════════════════════
// PORTFOLIO HELPERS
// ═══════════════════════════════════════════════════════
function getPortfolioValue() {
  return STATE.portfolio.reduce((sum, pos) => {
    const etf = ETF_DB.find(e => e.t === pos.ticker);
    return sum + (etf ? etf.p * pos.shares : pos.avgCost * pos.shares);
  }, 0);
}

function getPortfolioPnL() {
  return STATE.portfolio.reduce((sum, pos) => {
    const etf = ETF_DB.find(e => e.t === pos.ticker);
    const currentVal = etf ? etf.p * pos.shares : pos.avgCost * pos.shares;
    const costBasis = pos.avgCost * pos.shares;
    return sum + (currentVal - costBasis) + (pos.divsCollected || 0);
  }, 0);
}

function addPosition(ticker, shares, cost) {
  const existing = STATE.portfolio.find(p => p.ticker === ticker);
  if (existing) {
    const totalShares = existing.shares + shares;
    existing.avgCost = ((existing.avgCost * existing.shares) + (cost * shares)) / totalShares;
    existing.shares = totalShares;
  } else {
    STATE.portfolio.push({ ticker, shares, avgCost: cost, divsCollected: 0, entryDate: new Date().toISOString().split("T")[0] });
  }
  STATE.tradeLog.push({ type: "BUY", ticker, shares, price: cost, date: new Date().toISOString().split("T")[0], time: new Date().toLocaleTimeString() });
  saveState();
}

function removePosition(ticker) {
  const pos = STATE.portfolio.find(p => p.ticker === ticker);
  if (pos) {
    const etf = ETF_DB.find(e => e.t === ticker);
    const sellPrice = etf ? etf.p : pos.avgCost;
    STATE.tradeLog.push({ type: "SELL", ticker, shares: pos.shares, price: sellPrice, date: new Date().toISOString().split("T")[0], time: new Date().toLocaleTimeString(), pnl: (sellPrice - pos.avgCost) * pos.shares + (pos.divsCollected || 0) });
    STATE.portfolio = STATE.portfolio.filter(p => p.ticker !== ticker);
    saveState();
  }
}

function collectDividend(ticker) {
  const pos = STATE.portfolio.find(p => p.ticker === ticker);
  const etf = ETF_DB.find(e => e.t === ticker);
  if (pos && etf) {
    const divAmount = etf.div * pos.shares;
    pos.divsCollected = (pos.divsCollected || 0) + divAmount;
    STATE.tradeLog.push({ type: "DIV", ticker, shares: pos.shares, price: etf.div, date: new Date().toISOString().split("T")[0], time: new Date().toLocaleTimeString(), pnl: divAmount });
    saveState();
    return divAmount;
  }
  return 0;
}

// LIVE DATA: Finnhub API Integration
// ═══════════════════════════════════════════════════════
function updateRefreshUI(msg, pct, dotState) {
  const statusEl = document.getElementById("refreshStatus");
  const progressWrap = document.getElementById("refreshProgress");
  const progressFill = document.getElementById("refreshProgressFill");
  const dot = document.getElementById("liveDot");
  const btn = document.getElementById("refreshBtn");
  if (statusEl) statusEl.textContent = msg;
  if (progressWrap && pct !== undefined) {
    progressWrap.classList.toggle("hidden", pct < 0);
    if (progressFill) progressFill.style.width = pct + "%";
  }
  if (dot && dotState) { dot.className = "live-dot " + dotState; }
  if (btn) btn.disabled = STATE.refreshing;
}

async function fetchLiveData() {
  if (STATE.refreshing) return;
  if (STATE.dataProvider === "tradier") return fetchTradierData();
  if (!STATE.apiKey) {
    STATE.page = "settings";
    document.querySelectorAll(".nav-item").forEach(i => {
      i.classList.toggle("active", i.dataset.page === "settings");
    });
    render();
    alert("Enter your API key in Settings first.");
    return;
  }

  STATE.refreshing = true;
  updateRefreshUI("Connecting...", 0, "stale");
  let updated = 0, failed = 0, delay = 400;

  for (let i = 0; i < ETF_DB.length; i++) {
    const etf = ETF_DB[i];
    const pct = Math.round(((i + 1) / ETF_DB.length) * 100);
    updateRefreshUI(`${etf.t} (${i+1}/${ETF_DB.length})`, pct, "stale");

    try {
      const resp = await fetch(`https://finnhub.io/api/v1/quote?symbol=${etf.t}&token=${STATE.apiKey}`);
      if (resp.status === 429) {
        delay = Math.min(delay * 2, 3000);
        i--;
        updateRefreshUI(`Rate limited, waiting...`, pct, "stale");
        await new Promise(r => setTimeout(r, delay));
        continue;
      }
      if (resp.status === 401 || resp.status === 403) {
        STATE.refreshing = false;
        updateRefreshUI("Invalid API key", -1, "offline");
        alert("Invalid Finnhub API key. Check your key in Settings.");
        return;
      }
      const data = await resp.json();
      if (data.c && data.c > 0) {
        const oldPrice = etf.p;
        etf.p = data.c;
        etf.dayChange = data.dp || 0;
        etf.dayChangeAbs = data.d || 0;
        etf.high = data.h || etf.p;
        etf.low = data.l || etf.p;
        etf.prevClose = data.pc || etf.p;
        // Adjust momentum based on daily price action
        if (data.dp > 3) etf.mom = Math.min(100, etf.mom + 4);
        else if (data.dp > 1) etf.mom = Math.min(100, etf.mom + 2);
        else if (data.dp > 0) etf.mom = Math.min(100, etf.mom + 1);
        else if (data.dp < -3) etf.mom = Math.max(0, etf.mom - 4);
        else if (data.dp < -1) etf.mom = Math.max(0, etf.mom - 2);
        else if (data.dp < 0) etf.mom = Math.max(0, etf.mom - 1);
        updated++;
      } else {
        failed++;
      }
      delay = Math.max(delay * 0.9, 250);
    } catch (e) {
      console.warn(`Failed: ${etf.t}`, e);
      failed++;
    }

    if (i < ETF_DB.length - 1) await new Promise(r => setTimeout(r, delay));
  }

  STATE.lastRefresh = new Date().toISOString();
  STATE.refreshing = false;
  saveLivePrices();
  saveState();
  render();
  const timeStr = new Date().toLocaleTimeString();
  updateRefreshUI(`${updated} live @ ${timeStr}${failed ? ` (${failed} missed)` : ""}`, -1, "live");
}

function initLiveStatus() {
  const activeKey = STATE.dataProvider === "tradier" ? STATE.tradierKey : STATE.apiKey;
  if (!activeKey) {
    updateRefreshUI("No API key — set in Settings", -1, "offline");
  } else if (STATE.lastRefresh) {
    const ago = Math.round((Date.now() - new Date(STATE.lastRefresh).getTime()) / 60000);
    const isRecent = ago < 10;
    updateRefreshUI(`Last: ${ago < 1 ? "just now" : ago + "m ago"}`, -1, isRecent ? "live" : "stale");
  } else {
    updateRefreshUI("Ready — click Refresh", -1, "stale");
  }
}

// Auto-refresh every 5 minutes during market hours
setInterval(() => {
  if (!STATE.apiKey || STATE.refreshing) return;
  const now = new Date();
  const day = now.getDay();
  const mins = now.getHours() * 60 + now.getMinutes();
  const isMarket = day >= 1 && day <= 5 && mins >= 570 && mins < 960;
  if (isMarket) fetchLiveData();
}, 5 * 60 * 1000);

              <td class="positive">${fmt(e.ay)}%</td>
              <td>${momentumBar(e.mom)}</td>
              <td class="fw-bold" style="color:${parseFloat(score)>=60?'var(--green)':parseFloat(score)>=40?'var(--yellow)':'var(--red)'}">${score}</td>
              <td class="${pctClass(e.navE)}">${fmt(e.navE)}%</td>
              <td class="${pctClass(e.tr)}">${fmt(e.tr)}%</td>
              <td>${riskMeter(e.risk)}</td>
              <td class="text-muted">${fmt(e.er)}%</td>
              <td class="text-muted">${fmt(e.vol, 1)}M</td>
              <td>
                ${inPortfolio
                  ? `<button class="btn btn-sm btn-danger" onclick="doSell('${e.t}')">Sell</button>`
                  : `<button class="btn btn-sm btn-success" onclick="doBuy('${e.t}')">Buy</button>`}
              </td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
    <div class="text-muted text-xs mt-8">${etfs.length} ETFs shown. Click column headers to sort. Composite Score = momentum(30%) + yield(25%) + NAV stability(20%) + total return(15%) + risk adj(10%)</div>
  `;
}

function renderCalendar() {
  const today = getTodayDayName();
  return `
    <h2 style="font-size:16px;margin-bottom:16px">Weekly Trading Calendar — Buy & Sell Actions</h2>
    <div class="alert alert-info mb-16">🟢 BUY = purchase today to capture tomorrow's dividend. 🔴 SELL = ex-div today, sell after price stabilizes.</div>
    <div class="calendar-grid">
      ${DAYS.map(day => {
        const now = new Date();
        const todayDow = now.getDay() === 0 ? 6 : now.getDay() - 1;
        const dayIdx = DAYS.indexOf(day);
        const dayDate = new Date(now);
        dayDate.setDate(now.getDate() + (dayIdx - todayDow));
        const nextDay = DAYS[(dayIdx + 1) % 5];
        const nextDayDate = new Date(dayDate);
        nextDayDate.setDate(dayDate.getDate() + 1);
        if (nextDayDate.getDay() === 6) nextDayDate.setDate(nextDayDate.getDate() + 2);
        if (nextDayDate.getDay() === 0) nextDayDate.setDate(nextDayDate.getDate() + 1);
        const sellWeekly = ETF_DB.filter(e => e.freq === "W" && e.exDay === day);
        const sellMonthly = ETF_DB.filter(e => e.freq === "M" && e.exDayOfMonth).filter(e => {
          const exd = getNextExDivDate(e);
          return exd && exd.toDateString() === dayDate.toDateString();
        });
        const allSells = [...sellWeekly, ...sellMonthly].sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)));
        const buyWeekly = ETF_DB.filter(e => e.freq === "W" && e.exDay === nextDay);
        const buyMonthly = getMonthlyBuySignalsForDate(nextDayDate);
        const allBuys = [...buyWeekly, ...buyMonthly].sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)));
        const isToday = day === today;
        const totalActions = allSells.length + allBuys.length;
        const scoreBadge = (s) => {
          const c = s >= 70 ? 'var(--green)' : s >= 50 ? 'var(--orange)' : 'var(--red)';
          return '<span style="background:' + c + '22;color:' + c + ';padding:1px 4px;border-radius:3px;font-size:10px;font-weight:600">' + s + '</span>';
        };
        return `
          <div class="cal-day ${isToday ? 'today' : ''}" style="min-height:180px">
            <div class="cal-day-header flex flex-between">
              <span>${day}${isToday ? ' (TODAY)' : ''}</span>
              <span class="text-xs text-muted">${totalActions} actions</span>
            </div>
            ${allSells.length > 0 ? `
              <div style="margin-bottom:8px">
                <div class="text-xs fw-bold" style="color:var(--red);margin-bottom:4px">🔴 SELL (ex-div today) — ${allSells.length}</div>
                ${allSells.map((e, i) => `
                  <div class="cal-etf" style="border-left:2px solid var(--red);padding-left:6px">
                    <span style="display:flex;align-items:center;gap:4px">
                      <span style="color:var(--text-muted);font-size:10px;min-width:18px">#${i+1}</span>
                      <span class="fw-bold" style="color:var(--red)">${e.t}</span>
                      ${e.freq === "M" ? '<span style="background:#a78bfa22;color:#a78bfa;padding:0 3px;border-radius:2px;font-size:9px;font-weight:700">M</span>' : ''}
                      ${scoreBadge(compositeScore(e))}
                    </span>
                    <span class="positive text-xs">+$${fmt(e.div)}</span>
                  </div>
                `).join("")}
              </div>
            ` : ''}
            ${allBuys.length > 0 ? `
              <div>
                <div class="text-xs fw-bold" style="color:var(--green);margin-bottom:4px">🟢 BUY RANKED — ${allBuys.length}</div>
                ${allBuys.map((e, i) => `
                  <div class="cal-etf" style="border-left:2px solid ${i === 0 ? 'var(--gold, #f59e0b)' : i < 3 ? 'var(--green)' : 'var(--border)'};padding-left:6px">
                    <span style="display:flex;align-items:center;gap:4px">
                      <span style="color:${i < 3 ? 'var(--gold, #f59e0b)' : 'var(--text-muted)'};font-size:10px;min-width:18px;font-weight:${i < 3 ? '700' : '400'}">#${i+1}</span>
                      <span class="fw-bold" style="color:${i < 3 ? 'var(--gold, #f59e0b)' : 'var(--accent)'}">${e.t}</span>
                      ${e.freq === "M" ? '<span style="background:#a78bfa22;color:#a78bfa;padding:0 3px;border-radius:2px;font-size:9px;font-weight:700">M</span>' : ''}
                      ${scoreBadge(compositeScore(e))}
                    </span>
                    <span class="positive text-xs">$${fmt(e.div)}</span>
                  </div>
                `).join("")}
              </div>
            ` : ''}
            ${totalActions === 0 ? '<div class="text-muted text-xs" style="padding:20px 0;text-align:center">No actions this day</div>' : ''}
          </div>`;
      }).join("")}
    </div>
    <div class="mt-16 card">
      <div class="card-title mb-12">Weekly Capture Cycle Income Potential</div>
      <div class="grid grid-3">
        <div style="padding:10px;border:1px solid var(--border);border-radius:6px">
          <div class="text-xs text-muted">Tue → Buy Group 1 for Wed Ex-Div</div>
          <div class="text-xs" style="margin-top:4px">
            ${ETF_DB.filter(e => e.freq === "W" && e.exDay === "Wed").sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a))).slice(0,3).map(e => {
              const ps = positionSize(e);
              return `<div class="fw-bold" style="color:var(--accent)">${e.t} <span class="positive">+$${fmt(ps.expectedDiv)}</span></div>`;
            }).join("")}
          </div>
        </div>
        <div style="padding:10px;border:1px solid var(--border);border-radius:6px">
          <div class="text-xs text-muted">Wed → Buy Group 2 for Thu Ex-Div</div>
          <div class="text-xs" style="margin-top:4px">
            ${ETF_DB.filter(e => e.freq === "W" && e.exDay === "Thu").sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a))).slice(0,3).map(e => {
              const ps = positionSize(e);
              return `<div class="fw-bold" style="color:var(--accent)">${e.t} <span class="positive">+$${fmt(ps.expectedDiv)}</span></div>`;
            }).join("")}
          </div>
        </div>
        <div style="padding:10px;border:1px solid var(--green);border-radius:6px;background:var(--green-dim)">
          <div class="text-xs" style="color:var(--green)">Weekly Total (Top Picks)</div>
          <div class="fw-bold positive" style="font-size:18px;margin-top:4px">$${fmt(
            ETF_DB.filter(e => e.freq === "W" && (e.exDay === "Wed" || e.exDay === "Thu"))
              .sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)))
              .reduce((sum, e, i) => {
                if (i >= 8) return sum;
                return sum + positionSize(e).expectedDiv;
              }, 0)
          )}</div>
          <div class="text-xs positive">Est. from top 8 picks</div>
        </div>
      </div>
    </div>
    <div class="mt-16 card">
      <div class="card-title mb-12">📅 Monthly Ex-Dividend Schedule</div>
      <div class="text-xs text-muted mb-12">Monthly ETFs are merged into the weekly calendar above on their buy day. Below is the full schedule for reference.</div>
      ${(() => {
        const monthlyETFs = ETF_DB.filter(e => e.freq === "M" && e.exDayOfMonth);
        const groups = {};
        monthlyETFs.forEach(e => {
          const exDate = getNextExDivDate(e);
          if (!exDate) return;
          const key = exDate.toDateString();
          if (!groups[key]) groups[key] = { date: exDate, etfs: [] };
          groups[key].etfs.push(e);
        });
        const sorted = Object.values(groups).sort((a, b) => a.date - b.date);
        const now = new Date();
        const todayStr = now.toDateString();
        const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
        const tomorrowStr = tomorrow.toDateString();
        const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
        const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">
          ${sorted.map(g => {
            const ds = g.date.toDateString();
            const diffMs = g.date.getTime() - new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const daysUntil = Math.round(diffMs / 86400000);
            const isExDivToday = ds === todayStr;
            const isBuyToday = ds === tomorrowStr;
            const isPast = daysUntil < 0;
            let badgeHTML, borderColor, headerBg, opacity;
            if (isBuyToday) {
              badgeHTML = '<span style="background:var(--green);color:#000;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">🟢 BUY TODAY</span>';
              borderColor = 'var(--green)'; headerBg = 'var(--green-dim)'; opacity = '1';
            } else if (isExDivToday) {
              badgeHTML = '<span style="background:var(--red);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">🔴 EX-DIV TODAY</span>';
              borderColor = 'var(--red)'; headerBg = 'rgba(255,75,75,0.1)'; opacity = '1';
            } else if (isPast) {
              badgeHTML = '<span style="background:var(--bg-card);color:var(--text-muted);padding:2px 8px;border-radius:4px;font-size:11px">✅ Passed</span>';
              borderColor = 'var(--border)'; headerBg = 'var(--bg-card)'; opacity = '0.5';
            } else {
              const buyDaysUntil = daysUntil - 1;
              const buyLabel = buyDaysUntil <= 0 ? 'Buy now' : 'Buy in ' + buyDaysUntil + 'd';
              badgeHTML = '<span style="background:rgba(160,120,255,0.15);color:#a78bfa;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">📅 ' + buyLabel + '</span>';
              borderColor = '#a78bfa'; headerBg = 'rgba(160,120,255,0.08)'; opacity = '1';
            }
            const dateLabel = dayNames[g.date.getDay()] + ", " + monthNames[g.date.getMonth()] + " " + g.date.getDate();
            return `<div style="border:1px solid ${borderColor};border-radius:8px;overflow:hidden;opacity:${opacity}">
              <div style="background:${headerBg};padding:8px 10px;display:flex;justify-content:space-between;align-items:center">
                <span class="fw-bold text-xs">${dateLabel}</span>
                ${badgeHTML}
              </div>
              <div style="padding:8px 10px">
                ${g.etfs.sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a))).map((e, i) => `
                  <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
                    <div style="display:flex;align-items:center;gap:4px">
                      <span style="color:${i < 3 ? '#f59e0b' : 'var(--text-muted)'};font-size:10px;min-width:16px;font-weight:${i < 3 ? '700' : '400'}">#${i+1}</span>
                      <span class="fw-bold" style="color:var(--cyan)">${e.t}</span>
                      <span class="text-xs text-muted">${e.u}</span>
                    </div>
                    <div style="text-align:right">
                      <span class="positive text-xs fw-bold">$${fmt(e.div)}</span>
                      <span class="text-xs text-muted" style="margin-left:4px">${fmt(e.ay)}%</span>
                    </div>
                  </div>
                `).join("")}
              </div>
            </div>`;
          }).join("")}
        </div>`;
      })()}
    </div>
  `;
}

// PAGE: DAILY ACTIONS
// ═══════════════════════════════════════════════════════
function renderActionCard(e, availableCapital, isToday) {
  const ps = positionSize(e);
  const score = parseFloat(compositeScore(e));
  const goodScore = score >= 40;
  const goodMom = e.mom >= 40;
  const canAfford = ps.dollars <= availableCapital;
  const underLimit = STATE.portfolio.length < STATE.maxPositions;
  const inPortfolio = STATE.portfolio.find(p => p.ticker === e.t);
  const recommended = goodScore && goodMom && canAfford && underLimit && !inPortfolio;

  // Warnings (not hard blocks)
  const warnings = [];
  if (!canAfford) warnings.push("Exceeds available capital");
  if (!underLimit) warnings.push(`At max positions (${STATE.maxPositions})`);
  if (inPortfolio) warnings.push("Already in portfolio");
  if (!goodScore) warnings.push(`Score ${score.toFixed(1)} < 40`);
  if (!goodMom) warnings.push(`Momentum ${e.mom} < 40`);

  const signal = recommended ? "BUY" : (warnings.length && (inPortfolio || (!goodScore && !goodMom))) ? "SKIP" : "CAUTION";
  const cardClass = signal === "BUY" ? "buy" : signal === "CAUTION" ? "caution" : "hold";
  const sigClass = signal === "BUY" ? "signal-buy" : signal === "CAUTION" ? "signal-caution" : "signal-hold";

  return `
    <div class="action-card ${cardClass}">
      <div class="flex flex-between flex-center mb-8">
        <div>
          <span class="signal ${sigClass}"><span class="signal-dot"></span>${signal}</span>
          <span class="fw-bold" style="margin-left:8px;color:var(--accent)">${e.t}</span>
          <span class="text-muted text-xs" style="margin-left:8px">${e.n}</span>
        </div>
        <span class="text-xs">Score: <span class="fw-bold">${compositeScore(e)}</span></span>
      </div>
      <div class="grid grid-4" style="grid-template-columns:repeat(6,1fr);gap:8px;font-size:11px">
        <div><span class="text-muted">Price:</span> $${fmt(e.p)}</div>
        <div><span class="text-muted">Underlying:</span> ${e.u}</div>
        <div><span class="text-muted">Momentum:</span> ${momentumBar(e.mom)}</div>
        <div><span class="text-muted">Wk Yield:</span> <span class="positive">${fmt(e.wy)}%</span></div>
        <div><span class="text-muted">Risk:</span> ${riskMeter(e.risk)}</div>
        <div><span class="text-muted">NAV Erosion:</span> <span class="${pctClass(e.navE)}">${fmt(e.navE)}%</span></div>
      </div>
      <div class="mt-8 flex flex-between flex-center" style="background:${recommended ? 'var(--green-dim)' : 'var(--bg-input)'};padding:8px;border-radius:4px">
        <div>
          <span class="text-xs ${recommended ? 'positive' : 'text-muted'} fw-bold">Suggested: ${ps.shares} shares ($${fmt(ps.dollars)})</span>
          <span class="text-xs text-muted" style="margin-left:12px">Est. div: $${fmt(ps.expectedDiv)}</span>
          ${warnings.length ? `<span class="text-xs" style="margin-left:12px;color:var(--orange)">${warnings.join(" | ")}</span>` : ""}
        </div>
        ${!inPortfolio ? `<button class="btn btn-sm ${recommended ? 'btn-success' : ''}" onclick="doBuy('${e.t}')" style="${!recommended ? 'border-color:var(--orange);color:var(--orange)' : ''}">${isToday ? 'Execute Buy' : 'Buy'}</button>` : ""}
      </div>
    </div>`;
}

function renderActions() {
  const today = getTodayDayName();
  const todayIdx = DAYS.indexOf(today);
  const availableCapital = STATE.capital - getPortfolioValue();

  // Monthly buy signals for this week
  const monthlySignals = [];
  const now = new Date();
  for (let d = 0; d < 7; d++) {
    const checkDate = new Date(now);
    checkDate.setDate(now.getDate() + 1 + d);
    const dow = checkDate.getDay();
    if (dow === 0 || dow === 6) continue;
    const signals = getMonthlyBuySignalsForDate(checkDate);
    if (signals.length > 0) {
      const buyDayBefore = new Date(checkDate);
      buyDayBefore.setDate(checkDate.getDate() - 1);
      if (buyDayBefore.getDay() === 0) buyDayBefore.setDate(buyDayBefore.getDate() - 2);
      if (buyDayBefore.getDay() === 6) buyDayBefore.setDate(buyDayBefore.getDate() - 1);
      const buyDayStr = DAYS[buyDayBefore.getDay() - 1] || "Fri";
      monthlySignals.push({
        exDate: checkDate,
        exDateStr: checkDate.toLocaleDateString("en-US", {month:"short", day:"numeric"}),
        buyDay: buyDayStr,
        isToday: buyDayStr === today,
        etfs: signals
      });
    }
  }

  return `
    <h2 style="font-size:16px;margin-bottom:4px">Weekly Action Plan — Full Buy & Sell Cycle</h2>
    <div class="text-muted text-sm mb-16">Today is ${today} | Available capital: ${fmtMoney(availableCapital)} | ${new Date().toLocaleDateString("en-US", {month:"long", day:"numeric", year:"numeric"})}</div>

    ${DAYS.map(day => {
      const isToday = day === today;
      const isPast = DAYS.indexOf(day) < todayIdx;
      const nextDay = DAYS[(DAYS.indexOf(day) + 1) % 5];

      // SELL: ETFs going ex-div this day (collected dividend, time to sell)
      const sellETFs = ETF_DB.filter(e => e.freq === "W" && e.exDay === day).sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)));
      // BUY: ETFs going ex-div the NEXT day (buy today to capture)
      const buyETFs = ETF_DB.filter(e => e.freq === "W" && e.exDay === nextDay).sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)));
      // Portfolio positions to sell today
      const portfolioSells = isToday ? STATE.portfolio.filter(pos => {
        const etf = ETF_DB.find(e => e.t === pos.ticker);
        return etf && etf.freq === "W" && etf.exDay === today;
      }) : [];

      const totalActions = sellETFs.length + buyETFs.length;

      return `
        <div class="day-section ${isPast ? 'upcoming' : ''}" style="${isPast ? 'opacity:0.5' : ''}">
          <div class="day-section-header ${isToday ? 'today' : 'future'}">
            <span>${isToday ? '⚡ TODAY' : day}</span>
            <span style="font-weight:400;font-size:12px">
              ${sellETFs.length > 0 ? `🔴 Sell ${sellETFs.length}` : ''}
              ${sellETFs.length > 0 && buyETFs.length > 0 ? ' + ' : ''}
              ${buyETFs.length > 0 ? `🟢 Buy ${buyETFs.length} (for ${nextDay} ex-div)` : ''}
              ${totalActions === 0 ? 'No weekly actions' : ''}
            </span>
            ${isToday ? '<span class="badge badge-green" style="margin-left:auto">ACTION NOW</span>' : ''}
          </div>

          ${portfolioSells.length > 0 ? `
            <div class="alert alert-warning mb-8" style="margin-top:8px">SELL SIGNAL: ${portfolioSells.length} position(s) went ex-div today</div>
            ${portfolioSells.map(pos => {
              const etf = ETF_DB.find(e => e.t === pos.ticker);
              const pnl = etf ? (etf.p - pos.avgCost) * pos.shares + (pos.divsCollected || 0) : 0;
              return `
                <div class="action-card sell">
                  <div class="flex flex-between flex-center mb-8">
                    <div>
                      <span class="signal signal-sell"><span class="signal-dot"></span>SELL</span>
                      <span class="fw-bold" style="margin-left:8px;color:var(--accent)">${pos.ticker}</span>
                      <span class="text-muted text-xs" style="margin-left:8px">${pos.shares} shares @ $${fmt(pos.avgCost)}</span>
                    </div>
                    <span class="${pctClass(pnl)} fw-bold">${fmtMoneySign(pnl)}</span>
                  </div>
                  <div class="mt-8">
                    <button class="btn btn-sm btn-success" onclick="doCollectDiv('${pos.ticker}')" ${pos.divsCollected > 0 ? 'disabled' : ''}>Collect Div</button>
                    <button class="btn btn-sm btn-danger" onclick="doSell('${pos.ticker}')" style="margin-left:8px">Sell Position</button>
                  </div>
                </div>`;
            }).join("")}
          ` : ''}

          ${sellETFs.length > 0 && !isToday ? `
            <div style="margin:8px 0;padding:8px 12px;background:var(--red-dim);border-radius:6px;border-left:3px solid var(--red)">
              <div class="text-xs fw-bold" style="color:var(--red);margin-bottom:4px">🔴 SELL — Ex-div day (collect dividend & close positions)</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px">
                ${sellETFs.map(e => `<span class="badge" style="background:var(--red-dim);color:var(--red);border:1px solid var(--red)">${e.t} <span class="positive">+$${fmt(e.div)}</span></span>`).join("")}
              </div>
            </div>
          ` : ''}
          ${sellETFs.length > 0 && isToday && portfolioSells.length === 0 ? `
            <div style="margin:8px 0;padding:8px 12px;background:var(--red-dim);border-radius:6px;border-left:3px solid var(--red)">
              <div class="text-xs fw-bold" style="color:var(--red);margin-bottom:4px">🔴 SELL — These ETFs go ex-div today (sell if you hold positions)</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px">
                ${sellETFs.map(e => `<span class="badge" style="background:var(--red-dim);color:var(--red);border:1px solid var(--red)">${e.t} <span class="positive">+$${fmt(e.div)}</span></span>`).join("")}
              </div>
            </div>
          ` : ''}

          ${buyETFs.length > 0 ? `
            <div style="margin:8px 0">
              <div class="text-xs fw-bold" style="color:var(--green);margin-bottom:8px;padding:4px 0">🟢 BUY — Position for ${nextDay} ex-div</div>
              ${isToday ? buyETFs.map(e => renderActionCard(e, availableCapital, true)).join("") :
                `<div style="display:flex;flex-wrap:wrap;gap:6px">
                  ${buyETFs.slice(0, 8).map(e => {
                    const ps = positionSize(e);
                    return `<div style="padding:6px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;border-left:3px solid var(--green);font-size:11px">
                      <span class="fw-bold" style="color:var(--accent)">${e.t}</span>
                      <span class="text-muted">${e.u}</span>
                      <span class="positive">$${fmt(e.div)}</span>
                      <span class="text-xs text-muted">Score: ${compositeScore(e)}</span>
                    </div>`;
                  }).join("")}
                  ${buyETFs.length > 8 ? `<div class="text-xs text-muted" style="align-self:center">+${buyETFs.length - 8} more</div>` : ''}
                </div>`}
            </div>
          ` : ''}

          ${totalActions === 0 ? '<div class="text-muted text-xs" style="padding:12px 0">No weekly ETFs to buy or sell on this day.</div>' : ''}
        </div>`;
    }).join("")}

                    <div><span class="text-muted">Risk:</span> ${riskMeter(e.risk)}</div>
                  </div>

      <table>

// ═══════════════════════════════════════════════════════
// PAGE: CAPITAL ALLOCATOR
// ═══════════════════════════════════════════════════════
function renderAllocator() {
  const available = STATE.capital - getPortfolioValue();
  const today = getTodayDayName();
  const tomorrowDay = DAYS[(DAYS.indexOf(today) + 1) % 5];
  const candidates = ETF_DB.filter(e => e.freq === "W" && e.exDay === tomorrowDay)
    .sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)))
    .filter(e => parseFloat(compositeScore(e)) >= 35 && e.mom >= 30);

  let remainingCapital = available;
  const allocations = [];
  for (const e of candidates) {
    if (allocations.length >= STATE.maxPositions) break;
    if (STATE.portfolio.find(p => p.ticker === e.t)) continue;
    const ps = positionSize(e);
    if (ps.dollars > remainingCapital) continue;
    allocations.push({ etf: e, ...ps, score: compositeScore(e) });
    remainingCapital -= ps.dollars;
  }

  const totalAllocated = allocations.reduce((s, a) => s + a.dollars, 0);
  const totalExpectedDiv = allocations.reduce((s, a) => s + a.expectedDiv, 0);
  const weeklyProjection = DAYS.reduce((sum, day) => {
    const nextDay = DAYS[(DAYS.indexOf(day) + 1) % 5];
    const best = ETF_DB.filter(e => e.freq === "W" && e.exDay === nextDay).sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)))[0];
    return sum + (best ? positionSize(best).expectedDiv : 0);
  }, 0);

  return `
    <h2 style="font-size:16px;margin-bottom:16px">Capital Allocation Engine</h2>
    <div class="grid grid-4 mb-16">
      <div class="card">
        <div class="card-title">Total Capital</div>
        <div class="stat-value">${fmtMoney(STATE.capital)}</div>
      </div>
      <div class="card">
        <div class="card-title">Available</div>
        <div class="stat-value">${fmtMoney(available)}</div>
      </div>
      <div class="card">
        <div class="card-title">Today's Allocation</div>
        <div class="stat-value">${fmtMoney(totalAllocated)}</div>
        <div class="stat-label">${allocations.length} positions</div>
      </div>
      <div class="card">
        <div class="card-title">Est. Weekly Income</div>
        <div class="stat-value positive">${fmtMoney(weeklyProjection)}</div>
        <div class="stat-label">${fmt(weeklyProjection / STATE.capital * 100, 3)}% weekly return</div>
      </div>
    </div>

    <div class="card mb-16">
      <div class="card-title mb-12">Optimal Allocation for ${tomorrowDay} Ex-Div (Buy Today)</div>
      ${allocations.length === 0 ? '<div class="text-muted">No qualifying ETFs or insufficient capital.</div>' : `
        <table>
          <thead><tr><th>Rank</th><th>Ticker</th><th>Underlying</th><th>Score</th><th>Momentum</th><th>Wk Yield</th><th>Risk</th><th>Shares</th><th>$ Allocated</th><th>% of Capital</th><th>Est. Dividend</th><th>Action</th></tr></thead>
          <tbody>
            ${allocations.map((a, i) => `
              <tr>
                <td class="fw-bold">#${i+1}</td>
                <td class="fw-bold" style="color:var(--accent)">${a.etf.t}</td>
                <td>${a.etf.u}</td>
                <td class="fw-bold">${a.score}</td>
                <td>${momentumBar(a.etf.mom)}</td>
                <td class="positive">${fmt(a.etf.wy)}%</td>
                <td>${riskMeter(a.etf.risk)}</td>
                <td>${a.shares}</td>
                <td>$${fmt(a.dollars)}</td>
                <td>${fmt(a.dollars / STATE.capital * 100)}%</td>
                <td class="positive fw-bold">$${fmt(a.expectedDiv)}</td>
                <td><button class="btn btn-sm btn-success" onclick="doBuy('${a.etf.t}')">Buy</button></td>
              </tr>
            `).join("")}
            <tr style="background:var(--green-dim)">
              <td colspan="7" class="fw-bold positive">TOTALS</td>
              <td></td>
              <td class="fw-bold">$${fmt(totalAllocated)}</td>
              <td class="fw-bold">${fmt(totalAllocated / STATE.capital * 100)}%</td>
              <td class="positive fw-bold">$${fmt(totalExpectedDiv)}</td>
              <td><button class="btn btn-sm btn-primary" onclick="doBuyAll()">Buy All</button></td>
            </tr>
          </tbody>
        </table>
      `}
    </div>

    <div class="card">
      <div class="card-title mb-12">Position Sizing Rules</div>
      <div class="grid grid-3" style="font-size:12px">
        <div>
          <div class="text-muted text-xs mb-8">Risk Profile: ${STATE.riskProfile.toUpperCase()}</div>
          <div>Max per position: ${STATE.maxPositionPct}%</div>
          <div>Max positions: ${STATE.maxPositions}</div>
        </div>
        <div>
          <div class="text-muted text-xs mb-8">Risk Adjustments</div>
          <div>Very Low risk: 120% size</div>
          <div>Low risk: 100% size</div>
          <div>Medium risk: 80% size</div>
        </div>
        <div>
          <div class="text-muted text-xs mb-8">&nbsp;</div>
          <div>High risk: 60% size</div>
          <div>Very High risk: 40% size</div>
          <div class="text-muted mt-8">Adjust in Settings</div>
        </div>
      </div>
    </div>

    <div class="card mt-16">
      <div class="card-title mb-12">Weekly Projected Income by Day</div>
      <div class="chart-container"><canvas id="weeklyIncomeChart"></canvas></div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════
// PAGE: ANALYTICS
// ═══════════════════════════════════════════════════════
function renderAnalytics() {
  const totalTrades = STATE.tradeLog.length;
  const sells = STATE.tradeLog.filter(l => l.type === "SELL");
  const wins = sells.filter(l => l.pnl > 0);
  const winRate = sells.length > 0 ? (wins.length / sells.length * 100) : 0;
  const totalPnL = sells.reduce((s, l) => s + (l.pnl || 0), 0) + STATE.tradeLog.filter(l => l.type === "DIV").reduce((s, l) => s + (l.pnl || 0), 0);
  const divIncome = STATE.tradeLog.filter(l => l.type === "DIV").reduce((s, l) => s + (l.pnl || 0), 0);

  // Sector analysis
  const sectorData = {};
  ETF_DB.forEach(e => {
    if (!sectorData[e.sec]) sectorData[e.sec] = { count: 0, avgMom: 0, avgYield: 0, totalMom: 0, totalYield: 0 };
    sectorData[e.sec].count++;
    sectorData[e.sec].totalMom += e.mom;
    sectorData[e.sec].totalYield += e.wy;
  });
  Object.keys(sectorData).forEach(s => {
    sectorData[s].avgMom = sectorData[s].totalMom / sectorData[s].count;
    sectorData[s].avgYield = sectorData[s].totalYield / sectorData[s].count;
  });

  return `
    <h2 style="font-size:16px;margin-bottom:16px">Performance Analytics</h2>
    <div class="grid grid-4 mb-16">
      <div class="card">
        <div class="card-title">Total Trades</div>
        <div class="stat-value">${totalTrades}</div>
      </div>
      <div class="card">
        <div class="card-title">Win Rate</div>
        <div class="stat-value ${winRate >= 60 ? 'positive' : winRate >= 40 ? 'neutral' : 'negative'}">${fmt(winRate, 0)}%</div>
        <div class="stat-label">${wins.length}W / ${sells.length - wins.length}L</div>
      </div>
      <div class="card">
        <div class="card-title">Total P&L</div>
        <div class="stat-value ${pctClass(totalPnL)}">${fmtMoneySign(totalPnL)}</div>
      </div>
      <div class="card">
        <div class="card-title">Dividend Income</div>
        <div class="stat-value positive">${fmtMoney(divIncome)}</div>
      </div>
    </div>

    <div class="grid grid-2 mb-16">
      <div class="card">
        <div class="card-title mb-12">P&L by Trade</div>
        <div class="chart-container"><canvas id="pnlChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title mb-12">Income Breakdown</div>
        <div class="chart-container"><canvas id="incomeChart"></canvas></div>
      </div>
    </div>

    <div class="card mb-16">
      <div class="card-title mb-12">Sector Analysis</div>
      <table>
        <thead><tr><th>Sector</th><th>ETF Count</th><th>Avg Momentum</th><th>Avg Wk Yield</th><th>Sector Signal</th></tr></thead>
        <tbody>
          ${Object.entries(sectorData).sort((a,b) => b[1].avgMom - a[1].avgMom).map(([sec, data]) => `
            <tr>
              <td class="fw-bold">${sec}</td>
              <td>${data.count}</td>
              <td>${momentumBar(Math.round(data.avgMom))}</td>
              <td class="positive">${fmt(data.avgYield)}%</td>
              <td><span class="badge ${data.avgMom >= 60 ? 'badge-green' : data.avgMom >= 45 ? 'badge-yellow' : 'badge-red'}">${data.avgMom >= 60 ? 'BULLISH' : data.avgMom >= 45 ? 'NEUTRAL' : 'BEARISH'}</span></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-title mb-12">ETF Type Comparison</div>
      <div class="chart-container"><canvas id="typeChart"></canvas></div>
    </div>
  `;
}

let charts = {};
function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

function initCharts() {
  destroyCharts();
  const cs = getComputedStyle(document.documentElement);
  const defaults = { color: cs.getPropertyValue('--text-muted').trim() || '#94a3b8', borderColor: cs.getPropertyValue('--border').trim() || '#2a3a52', font: { family: "-apple-system, BlinkMacSystemFont, 'Inter', sans-serif", size: 10 } };
  Chart.defaults.color = defaults.color;
  Chart.defaults.borderColor = defaults.borderColor;

  if (STATE.page === "dashboard") {
    // Sector chart
    const sectorCounts = {};
    ETF_DB.forEach(e => { sectorCounts[e.sec] = (sectorCounts[e.sec] || 0) + 1; });
    const sectorEl = document.getElementById("sectorChart");
    if (sectorEl) {
      charts.sector = new Chart(sectorEl, {
        type: "doughnut",
        data: {
          labels: Object.keys(sectorCounts),
          datasets: [{ data: Object.values(sectorCounts), backgroundColor: ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#f97316","#ec4899","#14b8a6","#6366f1","#84cc16","#e11d48"], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "right", labels: { boxWidth: 10, font: { size: 10 } } } } }
      });
    }

    // Scatter chart
    const scatterEl = document.getElementById("scatterChart");
    if (scatterEl) {
      charts.scatter = new Chart(scatterEl, {
        type: "scatter",
        data: {
          datasets: [{
            label: "ETFs",
            data: ETF_DB.map(e => ({ x: e.risk, y: e.wy, label: e.t })),
            backgroundColor: ETF_DB.map(e => getMomentumColor(e.mom)),
            pointRadius: 6,
            pointHoverRadius: 8,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { x: { title: { display: true, text: "Risk Level" }, min: 0, max: 6 }, y: { title: { display: true, text: "Weekly Yield %" } } },
          plugins: {
            tooltip: { callbacks: { label: ctx => `${ETF_DB[ctx.dataIndex].t}: ${fmt(ctx.parsed.y)}% yield, Risk ${ctx.parsed.x}` } },
            legend: { display: false }
          }
        }
      });
    }
  }

  if (STATE.page === "analytics") {
    // P&L chart
    const pnlEl = document.getElementById("pnlChart");
    if (pnlEl) {
      const pnlTrades = STATE.tradeLog.filter(l => l.pnl !== undefined);
      let cumPnl = 0;
      const cumData = pnlTrades.map(l => { cumPnl += l.pnl; return cumPnl; });
      charts.pnl = new Chart(pnlEl, {
        type: "line",
        data: {
          labels: pnlTrades.map((l, i) => `#${i+1}`),
          datasets: [{
            label: "Cumulative P&L",
            data: cumData,
            borderColor: "#3b82f6",
            backgroundColor: "rgba(59,130,246,0.1)",
            fill: true,
            tension: 0.3,
            pointRadius: 3,
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }

    // Income chart
    const incomeEl = document.getElementById("incomeChart");
    if (incomeEl) {
      const divTotal = STATE.tradeLog.filter(l => l.type === "DIV").reduce((s, l) => s + (l.pnl || 0), 0);
      const tradeTotal = STATE.tradeLog.filter(l => l.type === "SELL").reduce((s, l) => s + (l.pnl || 0), 0);
      charts.income = new Chart(incomeEl, {
        type: "doughnut",
        data: {
          labels: ["Dividend Income", "Trade P&L"],
          datasets: [{ data: [Math.max(0, divTotal), Math.max(0, tradeTotal)], backgroundColor: ["#10b981", "#3b82f6"], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Type comparison chart
    const typeEl = document.getElementById("typeChart");
    if (typeEl) {
      const typeData = {};
      ETF_DB.forEach(e => {
        if (!typeData[e.type]) typeData[e.type] = { yields: [], moms: [] };
        typeData[e.type].yields.push(e.wy);
        typeData[e.type].moms.push(e.mom);
      });
      const labels = Object.keys(typeData);
      charts.type = new Chart(typeEl, {
        type: "bar",
        data: {
          labels,
          datasets: [
            { label: "Avg Wk Yield %", data: labels.map(l => typeData[l].yields.reduce((a,b)=>a+b,0)/typeData[l].yields.length), backgroundColor: "#10b981" },
            { label: "Avg Momentum", data: labels.map(l => typeData[l].moms.reduce((a,b)=>a+b,0)/typeData[l].moms.length / 10), backgroundColor: "#3b82f6" },

        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }

    }
  }

  if (STATE.page === "allocator") {
    const wkEl = document.getElementById("weeklyIncomeChart");
    if (wkEl) {
      const dayData = DAYS.map(day => {
        const nextDay = DAYS[(DAYS.indexOf(day) + 1) % 5];
        const etfs = ETF_DB.filter(e => e.freq === "W" && e.exDay === nextDay).sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)));
        const top3 = etfs.slice(0, 3);
        return top3.reduce((s, e) => s + positionSize(e).expectedDiv, 0);
      });
      charts.weekly = new Chart(wkEl, {
        type: "bar",
        data: {
          labels: DAYS.map(d => `Buy ${d}`),
          datasets: [{ label: "Est. Dividend Income ($)", data: dayData, backgroundColor: DAYS.map((d, i) => d === getTodayDayName() ? "#3b82f6" : "#10b981"), borderRadius: 4 }]

      });
    }
  }
}

function doBuy(ticker) {
  showBuyModal(ticker);
}

function doBuyAll() {
  const today = getTodayDayName();
  const tomorrowDay = DAYS[(DAYS.indexOf(today) + 1) % 5];
  const candidates = ETF_DB.filter(e => e.freq === "W" && e.exDay === tomorrowDay)
    .sort((a,b) => parseFloat(compositeScore(b)) - parseFloat(compositeScore(a)))
    .filter(e => parseFloat(compositeScore(e)) >= 35 && e.mom >= 30 && !STATE.portfolio.find(p => p.ticker === e.t));

  let remaining = STATE.capital - getPortfolioValue();
  let count = 0;
  for (const e of candidates) {
    if (STATE.portfolio.length + count >= STATE.maxPositions) break;
    const ps = positionSize(e);
    if (ps.dollars > remaining || ps.shares < 1) continue;
    addPosition(e.t, ps.shares, e.p);
    remaining -= ps.dollars;
    count++;
  }
  if (count > 0) { alert(`Bought ${count} positions.`); render(); }
  else alert("No qualifying positions or insufficient capital.");
}

function doSell(ticker) {
  if (confirm(`SELL all shares of ${ticker}?`)) {
    removePosition(ticker);
    render();

}

function doCollectDiv(ticker) {
  const amt = collectDividend(ticker);
  if (amt > 0) { alert(`Collected $${fmt(amt)} dividend from ${ticker}`); render(); }
  else alert("No dividend to collect or position not found.");
}

function exportCSV() {
  const headers = ["Ticker","Name","Underlying","Sector","Type","Price","ExDivDay","DivPerShare","WkYield%","AnnYield%","Momentum","CompositeScore","NAVErosion%","TotalReturn%","Risk","ExpenseRatio%","Volume(M)","CaptureEff%"];
  const rows = ETF_DB.map(e => [e.t, `"${e.n}"`, e.u, e.sec, e.type, e.p, e.exDay, e.div, e.wy, e.ay, e.mom, compositeScore(e), e.navE, e.tr, e.risk, e.er, e.vol, captureEfficiency(e)]);
  downloadCSV("etf_database.csv", headers, rows);
}

function exportPortfolioCSV() {
  const headers = ["Ticker","Shares","AvgCost","CurrentPrice","MarketValue","PricePnL","DivsCollected","TotalPnL","EntryDate"];
  const rows = STATE.portfolio.map(p => {
    const etf = ETF_DB.find(e => e.t === p.ticker);
    const cur = etf ? etf.p : p.avgCost;
    const mv = cur * p.shares;
    const ppnl = (cur - p.avgCost) * p.shares;
    return [p.ticker, p.shares, p.avgCost, cur, mv, ppnl, p.divsCollected || 0, ppnl + (p.divsCollected || 0), p.entryDate];
  });
  downloadCSV("portfolio.csv", headers, rows);
}

function exportTradeLogCSV() {
  const headers = ["Date","Time","Type","Ticker","Shares","Price","PnL"];
  const rows = STATE.tradeLog.map(l => [l.date, l.time, l.type, l.ticker, l.shares, l.price, l.pnl ?? ""]);
  downloadCSV("trade_log.csv", headers, rows);
}

function downloadCSV(filename, headers, rows) {
  const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  document.getElementById("clock").textContent =
    `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

  const day = now.getDay();
  const isWeekday = day >= 1 && day <= 5;
  const marketTime = h * 60 + m;
  const isMarketHours = isWeekday && marketTime >= 570 && marketTime < 960; // 9:30am - 4:00pm ET
  const statusEl = document.getElementById("marketStatus");
  if (isMarketHours) {
    statusEl.textContent = "MARKET OPEN";
    statusEl.className = "market-pill market-open";
  } else {
    statusEl.textContent = "MARKET CLOSED";
    statusEl.className = "market-pill market-closed";
  }
  // Auto-switch theme: light during market hours, dark after hours
  const currentTheme = document.documentElement.getAttribute("data-theme");
  const targetTheme = isMarketHours ? "light" : "dark";
  if (currentTheme !== targetTheme) {
    document.documentElement.setAttribute("data-theme", targetTheme);
    // Re-render charts with correct colors on theme change
    if (typeof renderCurrentPage === 'function') renderCurrentPage();
  }
}

// TRADIER API
// ═══════════════════════════════════════════════════════
async function fetchTradierData() {
  if (STATE.refreshing) return;
  if (!STATE.tradierKey) {
    STATE.page = "settings";
    document.querySelectorAll(".nav-item").forEach(i => i.classList.toggle("active", i.dataset.page === "settings"));
    render();
    alert("Enter your Tradier API key in Settings first.");
    return;
  }
  STATE.refreshing = true;
  updateRefreshUI("Connecting to Tradier...", 0, "stale");
  const baseUrl = STATE.tradierEnv === "production" ? "https://api.tradier.com" : "https://sandbox.tradier.com";
  const batchSize = 80;
  let updated = 0, failed = 0;
  for (let b = 0; b < ETF_DB.length; b += batchSize) {
    const batch = ETF_DB.slice(b, b + batchSize);
    const symbols = batch.map(e => e.t).join(",");
    const pct = Math.round(((b + batch.length) / ETF_DB.length) * 100);
    updateRefreshUI(`Batch ${Math.floor(b/batchSize)+1} (${b+1}-${b+batch.length}/${ETF_DB.length})`, pct, "stale");
    try {
      const resp = await fetch(`${baseUrl}/v1/markets/quotes?symbols=${symbols}&greeks=false`, {
        headers: { "Authorization": `Bearer ${STATE.tradierKey}`, "Accept": "application/json" }
      });
      if (resp.status === 401 || resp.status === 403) {
        STATE.refreshing = false;
        updateRefreshUI("Invalid Tradier key", -1, "offline");
        alert("Invalid Tradier API key. Check your key in Settings.");
        return;
      }
      const data = await resp.json();
      const quotes = data?.quotes?.quote;
      if (!quotes) { failed += batch.length; continue; }
      const qArr = Array.isArray(quotes) ? quotes : [quotes];
      qArr.forEach(q => {
        const etf = ETF_DB.find(e => e.t === q.symbol);
        if (etf && q.last && q.last > 0) {
          etf.p = q.last;
          etf.dayChange = q.change_percentage || 0;
          etf.dayChangeAbs = q.change || 0;
          etf.high = q.high || etf.p;
          etf.low = q.low || etf.p;
          etf.prevClose = q.prevclose || etf.p;
          if (q.change_percentage > 3) etf.mom = Math.min(100, etf.mom + 4);
          else if (q.change_percentage > 1) etf.mom = Math.min(100, etf.mom + 2);
          else if (q.change_percentage > 0) etf.mom = Math.min(100, etf.mom + 1);
          else if (q.change_percentage < -3) etf.mom = Math.max(0, etf.mom - 4);
          else if (q.change_percentage < -1) etf.mom = Math.max(0, etf.mom - 2);
          else if (q.change_percentage < 0) etf.mom = Math.max(0, etf.mom - 1);
          updated++;
        } else { failed++; }
      });
    } catch (e) {
      console.warn("Tradier batch failed:", e);
      failed += batch.length;
    }
  }
  STATE.lastRefresh = new Date().toISOString();
  STATE.refreshing = false;
  saveLivePrices();
  saveState();
  render();
  const timeStr = new Date().toLocaleTimeString();
  updateRefreshUI(`${updated} live @ ${timeStr}${failed ? ` (${failed} missed)` : ""}`, -1, "live");
}

      </div>
      <div style="background:var(--bg-input);padding:12px;border-radius:8px;margin-bottom:16px">
        <div style="font-size:11px;font-weight:600;margin-bottom:8px">Signal Classification</div>
        <div style="display:flex;gap:12px;font-size:11px">
          <span><span class="badge badge-green">BUY</span> Score &ge; 70</span>
          <span><span class="badge badge-yellow">CAUTION</span> Score 50-69</span>
          <span><span class="badge badge-red">SKIP</span> Score &lt; 50</span>
        </div>
      </div>
      <div style="background:var(--bg-input);padding:12px;border-radius:8px;margin-bottom:16px">
        <div style="font-size:11px;font-weight:600;margin-bottom:8px">Example: ${ex.t} (${ex.u})</div>
        <div style="font-size:10px;color:var(--text-muted);line-height:1.6">
          Momentum: ${ex.mom}/100 = <strong>${exMom}</strong> &times; 0.30 = ${(exMom*0.30).toFixed(3)}<br>
          Yield: ${ex.wy}%/1.5 = <strong>${exYld}</strong> &times; 0.25 = ${(exYld*0.25).toFixed(3)}<br>
          NAV: 1 + (${ex.navE}/50) = <strong>${exNav}</strong> &times; 0.20 = ${(exNav*0.20).toFixed(3)}<br>
          Return: ${ex.tr}/25 = <strong>${exTr}</strong> &times; 0.15 = ${(exTr*0.15).toFixed(3)}<br>
          Risk: (6-${ex.risk})/5 = <strong>${exRisk}</strong> &times; 0.10 = ${(exRisk*0.10).toFixed(3)}<br>
          <strong style="color:var(--cyan)">Total: ${compositeScore(ex)}</strong>
        </div>
      </div>
      <button class="btn btn-primary" onclick="document.getElementById('scoreLegendModal').remove()" style="width:100%">Close</button>
    </div>`;
  document.body.appendChild(modal);
}

// ═══════════════════════════════════════════════════════
// EDIT TRADE LOG MODAL
// ═══════════════════════════════════════════════════════
function showEditTradeModal(index) {
  const existing = document.getElementById("editTradeModal");
  if (existing) existing.remove();
  const trade = STATE.tradeLog[index];
  if (!trade) return;
  const tickers = ETF_DB.map(e => e.t).sort();
  const modal = document.createElement("div");
  modal.id = "editTradeModal";
  modal.className = "modal-overlay";
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div class="modal" style="max-width:440px">
      <h3 style="margin:0 0 16px;font-size:15px">Edit Trade Entry</h3>
      <div class="form-group">
        <label>Type</label>
        <select id="editTradeType">
          <option value="BUY" ${trade.type==="BUY"?"selected":""}>BUY</option>
          <option value="SELL" ${trade.type==="SELL"?"selected":""}>SELL</option>
          <option value="DIV" ${trade.type==="DIV"?"selected":""}>DIV</option>
        </select>
      </div>
      <div class="form-group">
        <label>Ticker</label>
        <select id="editTradeTicker">
          ${tickers.map(t => `<option value="${t}" ${t===trade.ticker?"selected":""}>${t}</option>`).join("")}
        </select>
      </div>
      <div class="grid grid-2" style="gap:12px">
        <div class="form-group"><label>Shares</label><input type="number" id="editTradeShares" value="${trade.shares}" min="1"></div>
        <div class="form-group"><label>Price</label><input type="number" id="editTradePrice" value="${trade.price}" step="0.01" min="0"></div>
      </div>
      <div class="grid grid-2" style="gap:12px">
        <div class="form-group"><label>Date</label><input type="date" id="editTradeDate" value="${trade.date}"></div>
        <div class="form-group"><label>P&L (optional)</label><input type="number" id="editTradePnl" value="${trade.pnl ?? ''}" step="0.01"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="confirmEditTrade(${index})" style="flex:1">Save</button>
        <button class="btn btn-danger" onclick="deleteTradeEntry(${index})">Delete</button>
        <button class="btn" onclick="document.getElementById('editTradeModal').remove()">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}
function confirmEditTrade(index) {
  const trade = STATE.tradeLog[index];
  if (!trade) return;
  trade.type = document.getElementById("editTradeType").value;
  trade.ticker = document.getElementById("editTradeTicker").value;
  trade.shares = parseInt(document.getElementById("editTradeShares").value) || 1;
  trade.price = parseFloat(document.getElementById("editTradePrice").value) || 0;
  trade.date = document.getElementById("editTradeDate").value;
  const pnlVal = document.getElementById("editTradePnl").value;
  trade.pnl = pnlVal !== "" ? parseFloat(pnlVal) : undefined;
  saveState();
  document.getElementById("editTradeModal")?.remove();
  render();
}
function deleteTradeEntry(index) {
  if (!confirm("Delete this trade log entry?")) return;
  STATE.tradeLog.splice(index, 1);
  saveState();
  document.getElementById("editTradeModal")?.remove();
  render();
}

// ═══════════════════════════════════════════════════════
// EDIT PORTFOLIO POSITION MODAL
// ═══════════════════════════════════════════════════════
function showEditPositionModal(ticker) {
  const existing = document.getElementById("editPosModal");
  if (existing) existing.remove();
  const pos = STATE.portfolio.find(p => p.ticker === ticker);
  if (!pos) return;
  const etf = ETF_DB.find(e => e.t === ticker);
  const modal = document.createElement("div");
  modal.id = "editPosModal";
  modal.className = "modal-overlay";
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div class="modal" style="max-width:440px">
      <h3 style="margin:0 0 16px;font-size:15px">Edit Position — ${ticker}</h3>
      ${etf ? `<div class="text-xs text-muted mb-12">${etf.n} | Current Price: $${fmt(etf.p)}</div>` : ''}
      <div class="grid grid-2" style="gap:12px">
        <div class="form-group"><label>Shares</label><input type="number" id="editPosShares" value="${pos.shares}" min="1"></div>
        <div class="form-group"><label>Avg Cost</label><input type="number" id="editPosAvgCost" value="${pos.avgCost}" step="0.01" min="0"></div>
      </div>
      <div class="grid grid-2" style="gap:12px">
        <div class="form-group"><label>Entry Date</label><input type="date" id="editPosEntryDate" value="${pos.entryDate || ''}"></div>
        <div class="form-group"><label>Divs Collected ($)</label><input type="number" id="editPosDivs" value="${pos.divsCollected || 0}" step="0.01" min="0"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="confirmEditPosition('${ticker}')" style="flex:1">Save</button>
        <button class="btn" onclick="document.getElementById('editPosModal').remove()">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}
function confirmEditPosition(ticker) {
  const pos = STATE.portfolio.find(p => p.ticker === ticker);
  if (!pos) return;
  pos.shares = parseInt(document.getElementById("editPosShares").value) || 1;
  pos.avgCost = parseFloat(document.getElementById("editPosAvgCost").value) || 0;
  pos.entryDate = document.getElementById("editPosEntryDate").value;
  pos.divsCollected = parseFloat(document.getElementById("editPosDivs").value) || 0;
  saveState();
  document.getElementById("editPosModal")?.remove();
  render();
}

// ═══════════════════════════════════════════════════════
// EDIT JOURNAL MODAL
// ═══════════════════════════════════════════════════════
function showEditJournalModal(index) {
  const existing = document.getElementById("editJournalModal");
  if (existing) existing.remove();
  const entry = STATE.journal[index];
  if (!entry) return;
  const modal = document.createElement("div");
  modal.id = "editJournalModal";
  modal.className = "modal-overlay";
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div class="modal" style="max-width:500px">
      <h3 style="margin:0 0 16px;font-size:15px">Edit Journal Entry</h3>
      <div class="form-group"><label>Date</label><input type="date" id="editJournalDate" value="${entry.date}"></div>
      <div class="form-group"><label>Notes</label><textarea id="editJournalText" style="width:100%;min-height:120px;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:12px">${entry.text}</textarea></div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="confirmEditJournal(${index})" style="flex:1">Save</button>
        <button class="btn btn-danger" onclick="deleteJournalEntryModal(${index})">Delete</button>
        <button class="btn" onclick="document.getElementById('editJournalModal').remove()">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}
function confirmEditJournal(index) {
  const entry = STATE.journal[index];
  if (!entry) return;
  entry.date = document.getElementById("editJournalDate").value;
  entry.text = document.getElementById("editJournalText").value;
  saveState();
  document.getElementById("editJournalModal")?.remove();
  render();
}
function deleteJournalEntryModal(index) {
  if (!confirm("Delete this journal entry?")) return;
  STATE.journal.splice(index, 1);
  saveState();
  document.getElementById("editJournalModal")?.remove();
  render();
}

// ═══════════════════════════════════════════════════════
// PAGE: TRADINGVIEW CHARTS
// ═══════════════════════════════════════════════════════
function renderCharts() {
  const days = ["All","Mon","Tue","Wed","Thu","Fri"];
  const filtered = STATE.chartDayFilter === "All" ? ETF_DB.filter(e => e.freq === "W") : ETF_DB.filter(e => e.exDay === STATE.chartDayFilter);
  const sorted = [...filtered].sort((a,b) => compositeScore(b) - compositeScore(a));
  const selETF = ETF_DB.find(e => e.t === STATE.chartTicker);
  return `
    <div style="margin-bottom:12px">
      <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
        ${days.map(d => `<button class="btn btn-sm ${STATE.chartDayFilter===d?'btn-primary':''}" onclick="STATE.chartDayFilter='${d}';render();loadTVWidget(STATE.chartTicker)">${d === "All" ? "All Days" : d + " Ex-Div"}</button>`).join("")}
      </div>
      <div style="display:flex;gap:4px;overflow-x:auto;padding:4px 0" class="ticker-scroller">
        ${sorted.map(e => {
          const sc = compositeScore(e);
          const cls = STATE.chartTicker === e.t ? 'btn-primary' : '';
          return `<button class="btn btn-sm ${cls}" style="white-space:nowrap;font-size:10px;padding:3px 8px" onclick="STATE.chartTicker='${e.t}';document.querySelectorAll('.ticker-scroller button').forEach(b=>b.classList.remove('btn-primary'));this.classList.add('btn-primary');loadTVWidget('${e.t}');document.getElementById('chartInfo').innerHTML=getChartInfo('${e.t}')">${e.t} <span style="opacity:0.6">${sc}</span></button>`;
        }).join("")}
      </div>
    </div>
    <div id="tv-widget" style="height:480px;background:var(--bg-card);border-radius:8px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px"></div>
    <div style="background:var(--bg-input);border-radius:8px;padding:6px 10px;margin-bottom:8px;font-size:10px;color:var(--text-muted)">
      EMAs (10/20/50) are added automatically. To customize colors or add indicators, use the chart's settings gear icon. Order blocks require TradingView Pro — not available in the free embed widget.
    </div>
    <div id="chartInfo" class="card" style="padding:12px">
      ${selETF ? getChartInfoHTML(selETF) : '<div class="text-muted">Select a ticker above</div>'}
    </div>
  `;
}
function getChartInfo(ticker) {
  const e = ETF_DB.find(x => x.t === ticker);
  return e ? getChartInfoHTML(e) : '';
}
function getChartInfoHTML(e) {
  const sc = compositeScore(e);
  const scColor = sc >= 70 ? 'var(--green)' : sc >= 50 ? 'var(--yellow)' : 'var(--orange)';
  return `
    <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;font-size:12px">
      <div><span class="fw-bold" style="color:var(--accent);font-size:14px">${e.t}</span> <span class="text-muted">${e.n}</span></div>
      <div>Underlying: <strong>${e.u}</strong></div>
      <div>Price: <strong>$${fmt(e.p)}</strong></div>
      <div>Score: <strong style="color:${scColor}">${sc}</strong> <span style="cursor:pointer;opacity:0.6" onclick="showScoreLegendModal()">(?)</span></div>
      <div>Yield: <strong>${e.wy}%/wk</strong></div>
      <div>Div: <strong>$${fmt(e.div)}</strong></div>
      <div>Risk: <strong>${RISK_LABELS[e.risk]}</strong></div>
      <div>Ex-Div: <strong>${e.exDay}</strong></div>
      <div>Freq: <span class="badge ${e.freq==="W"?"badge-green":"badge-yellow"}">${e.freq==="W"?"Weekly":"Monthly"}</span></div>
    </div>`;
}
function loadTVWidget(ticker) {
  const container = document.getElementById("tv-widget");
  if (!container) return;
  container.innerHTML = "";
  const widgetDiv = document.createElement("div");
  widgetDiv.className = "tradingview-widget-container";
  widgetDiv.style.height = "100%";
  container.appendChild(widgetDiv);
  const script = document.createElement("script");
  script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
  script.async = true;
  const theme = document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
  script.textContent = JSON.stringify({
    symbol: ticker,
    interval: "D",
    width: "100%",
    height: "100%",
    style: "1",
    theme: theme,
    timezone: "America/New_York",
    studies: [
      { id: "MAExp@tv-basicstudies", inputs: { length: 10 } },
      { id: "MAExp@tv-basicstudies", inputs: { length: 20 } },
      { id: "MAExp@tv-basicstudies", inputs: { length: 50 } }
    ],
    allow_symbol_change: true,
    hide_side_toolbar: false,
    details: true,
    calendar: false,
    support_host: "https://www.tradingview.com"
  });
  widgetDiv.appendChild(script);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
initLiveStatus();

// Auto-fetch on load if API key exists and data is stale (>10 min old)
const activeApiKey = STATE.dataProvider === "tradier" ? STATE.tradierKey : STATE.apiKey;
if (activeApiKey) {
  const staleMs = STATE.lastRefresh ? Date.now() - new Date(STATE.lastRefresh).getTime() : Infinity;
  if (staleMs > 10 * 60 * 1000) {
    setTimeout(() => fetchLiveData(), 1000);
  }
}
</script>
</body>
</html>
